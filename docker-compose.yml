services:
  # ==================== 控制容器 ====================
  # 控制前端 + 控制后端 + Claude Code + Docker CLI
  control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-avatar-control
    ports:
      - "${CONTROL_PORT:-42617}:3000"   # 控制后端 (API + WebSocket + 静态前端)
    volumes:
      # 共享应用代码 volume（Claude Code 在此修改文件）
      - app-data:/app/app
      # Claude 配置持久化（Skills 等）
      - claude-data:/app/.claude
      # SQLite 数据持久化（对话、消息、页面等）
      - control-data:/app/data
      # Docker socket 挂载（用于管理应用容器）
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      # Claude Code 配置（优先级：ANTHROPIC > ZHIPU > MINIMAX > QWEN > 代理）
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - CLAUDE_CODE_URL=${CLAUDE_CODE_URL}
      - CLAUDE_CODE_KEY=${CLAUDE_CODE_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL}
      # 应用容器名称（供 process.js 使用）
      - APP_CONTAINER_NAME=digital-avatar-app-dev
      - APP_PROD_CONTAINER_NAME=digital-avatar-app-prod
      # 应用前端外部访问地址（供控制面板 iframe/链接使用）
      - APP_EXTERNAL_URL=${APP_EXTERNAL_URL:-http://localhost:${APP_FRONTEND_PORT:-53781}}
      # 应用生产环境外部访问地址
      - APP_PROD_EXTERNAL_URL=${APP_PROD_EXTERNAL_URL:-http://localhost:${APP_PROD_PORT:-53780}}
      # Git 自动提交配置
      - GIT_USER_NAME=${GIT_USER_NAME:-Digital Avatar Bot}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-bot@digital-avatar.local}
      - GIT_REMOTE_URL=${GIT_REMOTE_URL}
      - GIT_AUTO_PUSH=${GIT_AUTO_PUSH:-true}
      # 登录鉴权（留空则不启用鉴权）
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - app-network

  # ==================== 应用容器（开发） ====================
  # 开发模式：node --watch + Vite HMR，代码修改即时生效
  app-dev:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: digital-avatar-app-dev
    ports:
      - "${APP_BACKEND_PORT:-53783}:3001"   # 应用后端
      - "${APP_FRONTEND_PORT:-53781}:5174"   # 应用前端
    volumes:
      # 共享应用代码 volume（运行代码来自此处）
      - app-data:/app
    environment:
      # Vite proxy 通过 Docker 网络访问控制后端
      - CONTROL_BACKEND_URL=http://control:3000
      # 登录鉴权（与控制端共享凭据）
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
    restart: unless-stopped
    networks:
      - app-network

  # ==================== 应用容器（生产） ====================
  # 生产模式：构建前端静态文件，单端口服务，不受开发调试影响
  app-prod:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: digital-avatar-app-prod
    entrypoint: ["/entrypoint-prod.sh"]
    ports:
      - "${APP_PROD_PORT:-53780}:3001"   # 应用后端（含静态前端）
    volumes:
      # 共享应用代码 volume（启动时构建，不会热更新）
      - app-data:/app
    environment:
      - NODE_ENV=production
      - CONTROL_BACKEND_URL=http://control:3000
      # 登录鉴权（与控制端共享凭据）
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
    restart: unless-stopped
    networks:
      - app-network

volumes:
  app-data:
    driver: local
  claude-data:
    driver: local
  control-data:
    driver: local

networks:
  app-network:
    driver: bridge
